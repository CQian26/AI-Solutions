<!-- BidMatch Tag Scorecard: ranks scraped contracts against a required-specifications profile and shows a radar chart per contract. Generated by bidmatch/scrape_bidmatch.py -> scorecard.json -->

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BidMatch Tag Scorecard</title>

  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: {} } }</script>

  <!-- React 18 (UMD) + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useMemo } = React;

    // ---- demo data: bundled output of bidmatch/scrape_bidmatch.py on the sample list.
    // Load your own scorecard.json (the file the scraper writes) to replace it.
    const DEMO_DATA = {"generated_at":"2026-06-30T14:44:13Z","axes":["AI & Machine Learning","Data & Analytics","Cloud & Infrastructure","Cybersecurity","Software Development","Eligibility & Set-Aside"],"contracts":[{"id":"BM-2026-0001","title":"Enterprise AI & Predictive Analytics Platform","url":"bidmatch/sample_pages/BM-2026-0001.html","agency":"State Department of Health & Human Services","tags":["Artificial Intelligence","Machine Learning","Predictive Analytics","Data Analytics","541511","Small Business"],"matched":{"AI & Machine Learning":["artificial intelligence","machine learning","natural language processing","predictive analytics","generative ai"],"Data & Analytics":["data analytics","data warehouse","dashboard"],"Cloud & Infrastructure":["cloud","aws"],"Cybersecurity":[],"Software Development":[],"Eligibility & Set-Aside":["small business","541511"]},"category_scores":{"AI & Machine Learning":7.5,"Data & Analytics":6.0,"Cloud & Infrastructure":4.4,"Cybersecurity":0.0,"Software Development":0.0,"Eligibility & Set-Aside":5.0},"overall_score":41.3,"rank":1},{"id":"BM-2026-0005","title":"Cybersecurity Assessment & Zero Trust Implementation","url":"bidmatch/sample_pages/BM-2026-0005.html","agency":"State Military Department","tags":["Cybersecurity","Zero Trust","FedRAMP","NIST","Penetration Testing","541519","SDVOSB"],"matched":{"AI & Machine Learning":[],"Data & Analytics":[],"Cloud & Infrastructure":["cloud","azure"],"Cybersecurity":["cybersecurity","zero trust","fedramp","nist","compliance","penetration testing"],"Software Development":[],"Eligibility & Set-Aside":["small business","veteran-owned","541511"]},"category_scores":{"AI & Machine Learning":0.0,"Data & Analytics":0.0,"Cloud & Infrastructure":4.4,"Cybersecurity":10.0,"Software Development":0.0,"Eligibility & Set-Aside":6.2},"overall_score":30.2,"rank":2},{"id":"BM-2026-0002","title":"Statewide Data Warehouse Modernization","url":"bidmatch/sample_pages/BM-2026-0002.html","agency":"Office of the State CIO","tags":["Data Warehouse","ETL","Big Data","Data Governance","Azure","518210"],"matched":{"AI & Machine Learning":["machine learning"],"Data & Analytics":["big data","data warehouse","etl","dashboard","data governance"],"Cloud & Infrastructure":["cloud","azure"],"Cybersecurity":[],"Software Development":["modernization"],"Eligibility & Set-Aside":["541511"]},"category_scores":{"AI & Machine Learning":1.9,"Data & Analytics":7.0,"Cloud & Infrastructure":4.4,"Cybersecurity":0.0,"Software Development":2.0,"Eligibility & Set-Aside":2.5},"overall_score":28.6,"rank":3},{"id":"BM-2026-0003","title":"Cloud Migration & DevSecOps Services","url":"bidmatch/sample_pages/BM-2026-0003.html","agency":"Department of Transportation","tags":["Cloud Computing","AWS","Kubernetes","DevSecOps","CI/CD","541512"],"matched":{"AI & Machine Learning":[],"Data & Analytics":[],"Cloud & Infrastructure":["cloud","aws","kubernetes","devops"],"Cybersecurity":["fedramp","nist","compliance"],"Software Development":["api","agile","modernization"],"Eligibility & Set-Aside":["541511"]},"category_scores":{"AI & Machine Learning":0.0,"Data & Analytics":0.0,"Cloud & Infrastructure":6.7,"Cybersecurity":4.0,"Software Development":5.0,"Eligibility & Set-Aside":2.5},"overall_score":27.0,"rank":4},{"id":"BM-2026-0004","title":"Municipal Website Redesign","url":"bidmatch/sample_pages/BM-2026-0004.html","agency":"City of Riverton","tags":["Web Development","Web Application","Accessibility","Small Business"],"matched":{"AI & Machine Learning":[],"Data & Analytics":[],"Cloud & Infrastructure":[],"Cybersecurity":[],"Software Development":["web application","api","agile"],"Eligibility & Set-Aside":["small business"]},"category_scores":{"AI & Machine Learning":0.0,"Data & Analytics":0.0,"Cloud & Infrastructure":0.0,"Cybersecurity":0.0,"Software Development":5.0,"Eligibility & Set-Aside":2.5},"overall_score":11.1,"rank":5},{"id":"BM-2026-0006","title":"Grounds Maintenance & Landscaping Services","url":"bidmatch/sample_pages/BM-2026-0006.html","agency":"State Parks Department","tags":["Landscaping","Groundskeeping","Mowing","Irrigation","561730"],"matched":{"AI & Machine Learning":[],"Data & Analytics":[],"Cloud & Infrastructure":[],"Cybersecurity":[],"Software Development":[],"Eligibility & Set-Aside":[]},"category_scores":{"AI & Machine Learning":0.0,"Data & Analytics":0.0,"Cloud & Infrastructure":0.0,"Cybersecurity":0.0,"Software Development":0.0,"Eligibility & Set-Aside":0.0},"overall_score":0.0,"rank":6}]};

    // ---------- radar math ----------
    const polar = (cx, cy, r, t) => ({ x: cx + r * Math.cos(t), y: cy + r * Math.sin(t) });

    function Radar({ axes, values }) {
      const size = 360, padding = 64;
      const cx = size / 2, cy = size / 2, maxR = size / 2 - padding;
      const N = axes.length;
      const angles = Array.from({ length: N }, (_, i) => -Math.PI / 2 + (i * 2 * Math.PI) / N);
      const rings = Array.from({ length: 5 }, (_, i) => ((i + 1) / 5) * maxR);
      const pts = axes.map((_, i) => polar(cx, cy, (Math.max(0, Math.min(10, values[i])) / 10) * maxR, angles[i]));

      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="mx-auto">
          {rings.map((r, i) => (
            <polygon key={"r" + i} fill="none" stroke="#e5e7eb" strokeWidth="1"
              points={angles.map(a => { const p = polar(cx, cy, r, a); return `${p.x},${p.y}`; }).join(" ")} />
          ))}
          {angles.map((a, i) => { const p = polar(cx, cy, maxR, a); return (
            <line key={"s" + i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#e5e7eb" strokeWidth="1" />
          ); })}
          <polygon points={pts.map(p => `${p.x},${p.y}`).join(" ")}
            fill="rgba(59,130,246,0.20)" stroke="#3b82f6" strokeWidth="2" />
          {pts.map((p, i) => <circle key={"d" + i} cx={p.x} cy={p.y} r="4" fill="#3b82f6" />)}
          {angles.map((a, i) => {
            const base = polar(cx, cy, maxR, a);
            const lp = polar(base.x, base.y, 14, a);
            const cos = Math.cos(a);
            const anchor = Math.abs(cos) < 0.35 ? "middle" : (cos > 0 ? "start" : "end");
            const words = axes[i].split(" ");
            return (
              <text key={"l" + i} x={lp.x} y={lp.y} fontSize="10" textAnchor={anchor}
                dominantBaseline="middle" fill="#0f172a">
                {words.length > 2
                  ? (<><tspan x={lp.x} dy="-0.5em">{words.slice(0, 2).join(" ")}</tspan>
                       <tspan x={lp.x} dy="1.1em">{words.slice(2).join(" ")}</tspan></>)
                  : axes[i]}
              </text>
            );
          })}
        </svg>
      );
    }

    const scoreColor = (v) => v >= 6.5 ? "bg-emerald-500" : v >= 3.5 ? "bg-amber-400" : v > 0 ? "bg-rose-400" : "bg-slate-200";
    const overallColor = (v) => v >= 40 ? "text-emerald-600" : v >= 20 ? "text-amber-600" : "text-rose-500";

    function App() {
      const [data, setData] = useState(DEMO_DATA);
      const [selId, setSelId] = useState(DEMO_DATA.contracts[0]?.id || null);
      const [status, setStatus] = useState("Showing bundled sample data.");

      const axes = data.axes;
      const selected = useMemo(
        () => data.contracts.find(c => c.id === selId) || data.contracts[0],
        [data, selId]
      );

      const loadFile = (file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const obj = JSON.parse(reader.result.toString());
            if (!obj.axes || !Array.isArray(obj.contracts)) throw new Error("missing axes/contracts");
            setData(obj);
            setSelId(obj.contracts[0]?.id || null);
            setStatus(`Loaded ${file.name} — ${obj.contracts.length} contracts.`);
          } catch (e) { setStatus("Could not parse that file: " + e.message); }
        };
        reader.readAsText(file);
      };

      const fetchLocal = async () => {
        try {
          const res = await fetch("bidmatch/scorecard.json");
          if (!res.ok) throw new Error("HTTP " + res.status);
          const obj = await res.json();
          setData(obj); setSelId(obj.contracts[0]?.id || null);
          setStatus("Loaded bidmatch/scorecard.json");
        } catch (e) {
          setStatus("Fetch failed (" + e.message + "). Serve the folder over http, or use 'Load JSON'.");
        }
      };

      return (
        <div className="min-h-screen flex flex-col items-center p-6 gap-5">
          <div className="w-full max-w-6xl">
            <h1 className="text-2xl font-semibold tracking-tight">BidMatch Tag Scorecard</h1>
            <p className="text-sm text-slate-600 mt-1">
              Each contract's scraped tags scored against your required specifications.
              Ranked by overall match; click a row for its radar profile.
            </p>
            <div className="mt-3 flex flex-wrap items-center gap-2 text-sm">
              <label className="px-3 py-1.5 rounded-lg border bg-white hover:bg-slate-50 cursor-pointer">
                Load scorecard.json
                <input type="file" accept="application/json" className="hidden"
                  onChange={e => loadFile(e.target.files && e.target.files[0])} />
              </label>
              <button className="px-3 py-1.5 rounded-lg border bg-white hover:bg-slate-50" onClick={fetchLocal}>
                Fetch bidmatch/scorecard.json
              </button>
              <span className="text-slate-500">{status}</span>
              {data.generated_at && <span className="text-slate-400 ml-auto">generated {data.generated_at}</span>}
            </div>
          </div>

          <div className="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-3 gap-5">
            {/* Ranked table */}
            <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm p-4 overflow-x-auto">
              <table className="w-full text-sm border-collapse">
                <thead>
                  <tr className="text-left text-slate-500 border-b">
                    <th className="py-2 pr-2">#</th>
                    <th className="py-2 pr-2">Contract</th>
                    {axes.map(a => (
                      <th key={a} className="py-2 px-1 text-center font-medium" title={a}>
                        {a.split(" ").map(w => w[0]).join("")}
                      </th>
                    ))}
                    <th className="py-2 pl-2 text-right">Overall</th>
                  </tr>
                </thead>
                <tbody>
                  {data.contracts.map(c => {
                    const sel = c.id === selected?.id;
                    return (
                      <tr key={c.id}
                        onClick={() => setSelId(c.id)}
                        className={"border-b cursor-pointer " + (sel ? "bg-blue-50" : "hover:bg-slate-50")}>
                        <td className="py-2 pr-2 font-semibold text-slate-400">{c.rank}</td>
                        <td className="py-2 pr-2">
                          <div className="font-medium text-slate-800 leading-tight">{c.title}</div>
                          <div className="text-xs text-slate-500">{c.id}{c.agency ? " · " + c.agency : ""}</div>
                        </td>
                        {axes.map(a => {
                          const v = (c.category_scores && c.category_scores[a]) || 0;
                          return (
                            <td key={a} className="py-2 px-1">
                              <div className="flex flex-col items-center gap-1" title={a + ": " + v}>
                                <span className={"w-7 h-7 rounded-md flex items-center justify-center text-[11px] font-semibold text-white " + scoreColor(v)}>
                                  {v > 0 ? v.toFixed(1) : ""}
                                </span>
                              </div>
                            </td>
                          );
                        })}
                        <td className="py-2 pl-2 text-right">
                          <div className={"font-semibold " + overallColor(c.overall_score)}>{c.overall_score.toFixed(1)}%</div>
                          <div className="mt-1 h-1.5 w-20 ml-auto bg-slate-100 rounded">
                            <div className="h-1.5 rounded bg-blue-500" style={{ width: Math.min(100, c.overall_score) + "%" }} />
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              <div className="mt-3 flex items-center gap-4 text-xs text-slate-500">
                <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-emerald-500 inline-block"></span>strong (≥6.5)</span>
                <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-amber-400 inline-block"></span>partial</span>
                <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-rose-400 inline-block"></span>weak</span>
                <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-slate-200 inline-block"></span>none</span>
                <span className="ml-2">Column headers are category initials — hover for the full name.</span>
              </div>
            </div>

            {/* Detail + radar */}
            <div className="bg-white rounded-2xl shadow-sm p-4 flex flex-col gap-3">
              {selected ? (
                <>
                  <div>
                    <div className="text-xs uppercase tracking-wide text-slate-400">Rank #{selected.rank} · {selected.overall_score.toFixed(1)}% match</div>
                    <div className="text-lg font-semibold leading-tight">{selected.title}</div>
                    <div className="text-xs text-slate-500">{selected.id}{selected.agency ? " · " + selected.agency : ""}</div>
                  </div>
                  <Radar axes={axes} values={axes.map(a => (selected.category_scores && selected.category_scores[a]) || 0)} />
                  <div>
                    <div className="text-sm font-medium mb-1">Matched specification tags</div>
                    <div className="space-y-2">
                      {axes.map(a => {
                        const m = (selected.matched && selected.matched[a]) || [];
                        return (
                          <div key={a}>
                            <div className="text-xs text-slate-500">{a} <span className="text-slate-400">({(selected.category_scores && selected.category_scores[a] || 0).toFixed(1)}/10)</span></div>
                            <div className="flex flex-wrap gap-1 mt-0.5">
                              {m.length ? m.map(t => (
                                <span key={t} className="px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 text-xs">{t}</span>
                              )) : <span className="text-xs text-slate-300">— no matches</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                  {selected.tags && selected.tags.length > 0 && (
                    <div>
                      <div className="text-sm font-medium mb-1 mt-1">Raw tags scraped</div>
                      <div className="flex flex-wrap gap-1">
                        {selected.tags.map(t => (
                          <span key={t} className="px-2 py-0.5 rounded-full bg-slate-100 text-slate-600 text-xs">{t}</span>
                        ))}
                      </div>
                    </div>
                  )}
                </>
              ) : <div className="text-slate-400 text-sm">No contract selected.</div>}
            </div>
          </div>

          <div className="w-full max-w-6xl text-xs text-slate-400">
            Generate real data: <code className="text-slate-500">python3 bidmatch/scrape_bidmatch.py --list your_list.csv --out bidmatch/scorecard.json</code>,
            then “Load scorecard.json” above.
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
